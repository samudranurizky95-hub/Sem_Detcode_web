<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - GET Code Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #000;
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Galaxy Background */
        .galaxy-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(ellipse at center, #1a0033 0%, #000011 50%, #000000 100%);
        }

        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            animation: twinkle 3s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        .planet {
            position: fixed;
            border-radius: 50%;
            z-index: -1;
        }

        .planet1 {
            width: 200px;
            height: 200px;
            background: radial-gradient(circle at 30% 30%, #ff6b6b, #4a0e0e);
            top: 10%;
            right: 10%;
            animation: float 20s infinite ease-in-out;
        }

        .planet2 {
            width: 150px;
            height: 150px;
            background: radial-gradient(circle at 30% 30%, #6b9fff, #0e2a4a);
            bottom: 20%;
            left: 5%;
            animation: float 25s infinite ease-in-out reverse;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-30px) rotate(180deg); }
        }

        .aurora {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: linear-gradient(45deg, 
                transparent 0%, 
                rgba(0, 255, 255, 0.1) 25%, 
                rgba(255, 0, 255, 0.1) 50%, 
                rgba(0, 255, 255, 0.1) 75%, 
                transparent 100%);
            animation: aurora-flow 15s infinite linear;
        }

        @keyframes aurora-flow {
            0% { transform: translateX(-100%) rotate(0deg); }
            100% { transform: translateX(100%) rotate(360deg); }
        }

        /* Main Container */
        .container {
            max-width: 400px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 1;
        }

        .login-card {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 25px;
            padding: 50px 40px;
            box-shadow: 0 0 40px rgba(0, 255, 255, 0.3);
            position: relative;
            overflow: hidden;
        }

        .glowing-border {
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, #00ffff, #ff00ff, #00ffff, #ff00ff);
            border-radius: 25px;
            opacity: 0.6;
            animation: glowing 3s linear infinite;
            z-index: -1;
        }

        @keyframes glowing {
            0% { filter: blur(5px) opacity(0.5); }
            50% { filter: blur(10px) opacity(0.8); }
            100% { filter: blur(5px) opacity(0.5); }
        }

        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #00ffff, #ff00ff, #00ffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: glow 2s infinite alternate;
            font-weight: 700;
        }

        @keyframes glow {
            from { filter: drop-shadow(0 0 10px rgba(0, 255, 255, 0.5)); }
            to { filter: drop-shadow(0 0 20px rgba(255, 0, 255, 0.5)); }
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.7);
            font-size: 1.1em;
        }

        .input-group {
            margin-bottom: 25px;
            position: relative;
        }

        .input-label {
            display: block;
            margin-bottom: 8px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.95em;
            font-weight: 500;
        }

        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 18px 20px;
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid rgba(255, 255, 255, 0.15);
            border-radius: 15px;
            color: #fff;
            font-size: 16px;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        input[type="text"]::placeholder,
        input[type="password"]::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #00ffff;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.4);
            background: rgba(255, 255, 255, 0.12);
        }

        .login-button {
            width: 100%;
            padding: 18px;
            background: linear-gradient(45deg, #00ffff, #ff00ff);
            border: none;
            border-radius: 15px;
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 10px;
        }

        .login-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 255, 255, 0.5);
        }

        .login-button:active {
            transform: translateY(-1px);
        }

        .login-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* Loading Animation */
        .loading {
            display: none;
            text-align: center;
            margin-top: 20px;
        }

        .loading.active {
            display: block;
        }

        .loader {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #00ffff;
            animation: spin 1s ease-in-out infinite;
            margin-bottom: 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Success/Error Messages */
        .message {
            padding: 15px 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-weight: 500;
            display: none;
            animation: slideIn 0.3s ease;
        }

        .message.success {
            background: rgba(0, 255, 0, 0.2);
            border: 1px solid rgba(0, 255, 0, 0.5);
            color: #00ff00;
        }

        .message.error {
            background: rgba(255, 0, 0, 0.2);
            border: 1px solid rgba(255, 0, 0, 0.5);
            color: #ff4444;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Credentials Hint */
        .credentials-hint {
            text-align: center;
            margin-top: 20px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            font-size: 0.9em;
            color: rgba(255, 255, 255, 0.6);
        }

        /* Responsive */
        @media (max-width: 480px) {
            .container { padding: 10px; }
            .login-card { padding: 40px 30px; }
            h1 { font-size: 2em; }
        }
    </style>
</head>
<body>
    <div class="galaxy-bg"></div>
    <div class="stars" id="stars"></div>
    <div class="planet planet1"></div>
    <div class="planet planet2"></div>
    <div class="aurora"></div>

    <div class="container">
        <div class="login-card">
            <div class="glowing-border"></div>
            
            <div class="login-header">
                <h1>Access Granted</h1>
                <p class="subtitle">Masukkan kredensial untuk melanjutkan</p>
            </div>

            <div class="message" id="message"></div>

            <form id="loginForm">
                <div class="input-group">
                    <label class="input-label" for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Masukkan username" required>
                </div>

                <div class="input-group">
                    <label class="input-label" for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Masukkan password" required>
                </div>

                <button type="submit" class="login-button" id="loginButton">
                    Login
                </button>

                <div class="loading" id="loading">
                    <div class="loader"></div>
                    <p style="color: rgba(255, 255, 255, 0.8);">Memverifikasi akses...</p>
                </div>
            </form>

            <div class="credentials-hint">
                <strong>Demo:</strong> Username: <code>test</code> | Password: <code>admin1234#</code>
            </div>
        </div>
    </div>

    <script>
        // Generate stars
        function createStars() {
            const starsContainer = document.getElementById('stars');
            const starCount = 150;
            
            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.width = Math.random() * 2.5 + 'px';
                star.style.height = star.style.width;
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 3 + 's';
                starsContainer.appendChild(star);
            }
        }

        // Login functionality
        const correctUsername = 'test';
        const correctPassword = 'admin1234#';

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const loginButton = document.getElementById('loginButton');
            const loading = document.getElementById('loading');
            const message = document.getElementById('message');

            // Reset previous messages
            message.className = 'message';
            message.style.display = 'none';

            // Show loading
            loginButton.disabled = true;
            loginButton.textContent = 'Memverifikasi...';
            loading.classList.add('active');

            // Simulate network delay
            setTimeout(() => {
                if (username === correctUsername && password === correctPassword) {
                    // Success
                    message.textContent = 'Login berhasil! Mengarahkan ke dashboard...';
                    message.className = 'message success';
                    message.style.display = 'block';
                    
                    // Redirect to GET Code Generator after 2 seconds
                    setTimeout(() => {
                        // You can replace this with your actual dashboard URL
                        window.location.href = 'getcode.html'; // Ganti dengan file GET Code Generator
                    }, 2000);
                } else {
                    // Error
                    message.textContent = 'Username atau password salah!';
                    message.className = 'message error';
                    message.style.display = 'block';
                    
                    loginButton.disabled = false;
                    loginButton.textContent = 'Login';
                }
                
                loading.classList.remove('active');
            }, 1500);
        });

        // Initialize
        createStars();

        // Add floating animation to login card
        const loginCard = document.querySelector('.login-card');
        setInterval(() => {
            loginCard.style.transform = `translateY(${Math.sin(Date.now() * 0.001) * 5}px)`;
        }, 50);
    </script>
</body>
</html>
